name: Radar Automatique Signal Zero

on:
  schedule:
    - cron: '0 */6 * * *' # La formule magique : "à la minute 0, toutes les 6 heures"
  workflow_dispatch: # Ce petit bouton nous permettra de le tester manuellement

jobs:
  scan-maritime:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Récupérer le code
        uses: actions/checkout@v3
        
      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 Installer les outils
        run: pip install -r requirements.txt
        
      - name: 🚀 Lancer le Robot de l'ombre
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py
